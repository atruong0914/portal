<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>Annika Truong's Portal</title>
        <link rel="stylesheet" href="css/nav.css">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/animated-star.css">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌟</text></svg>">
    </head>
    <body>
        <header>
            <div class="inner-header">
                <div class="logo-header">
                    <span class="animated-star" aria-label="Achiever Star">🌟</span>
                    <span>Annika Truong</span>
                </div>
                <p class="tagline">Frontend Developer & Designer</p>
                <nav class="topnav" id="myTopnav">
                    <ul>
                        <li nav-icon-item><a href="index.html">Bio</a></li>
                        <li nav-icon-item><a href="projects.html">Projects</a></li>
                        <li nav-icon-item><a href="https://github.com/atruong0914">GitHub</a></li>
                        <li nav-icon-item><a href="https://www.linkedin.com/in/annikatruong/">LinkedIn</a></li>
                        <li nav-icon-item nav-visible-item><a href="contact.html" class="active">Contact</a></li>
                        <li><a href="javascript:void(0);" class="icon" onclick="myFunction()">&#9776;</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="wrapper contact-wrapper">
            <img src="images/mail.png" class="mail-icon" alt="mail">
            <h2 class="contact-title">Let's get in touch!</h2>
            <p class="contact-subtitle">Have a project in mind, a question, or just want to connect?</p>

            <div class="message-card">
                <h3 class="message-card-title">Send a Message</h3>

                <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="004d3ef6-a20d-4a95-b0e8-55c296053e19">

                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last_name" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company <span class="optional-tag">(optional)</span></label>
                        <input type="text" id="company" name="company">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="reason">Reason for Contact</label>
                        <select id="reason" name="reason" required>
                            <option value="" disabled selected>Select one</option>
                            <option value="project">Project Inquiry</option>
                            <option value="job">Job Opportunity</option>
                            <option value="question">General Question</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="pill-btn pill-btn-filled">Send Message</button>
                        <button type="reset" class="pill-btn pill-btn-outline">Reset</button>
                    </div>
                </form>
            </div>
            <footer>
                <p><small>&copy; 2025-<span id="this-year"></span> by 
                    Annika Truong, All Rights Reserved ~ 
                    <a id="html-checker" href="#" target="_blank">Check HTML</a> ~ 
                    <a id="css-checker" href="#" target="_blank">Check CSS</a></small>
                </p>
            </footer>
        </main>
        <script src="js/main.js" defer></script>
    </body>
</html>
